<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DecoTV</title>

<style>
body{background:#0b0b0b;color:#fff;font-family:sans-serif;margin:0}
h1{text-align:center}
input{width:100%;padding:10px;margin:10px 0}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;padding:10px}
.card{cursor:pointer}
img{width:100%;border-radius:6px}
</style>
</head>

<body>

<h1>🎬 DecoTV</h1>

<input id="search" placeholder="搜索电影...">

<div id="app" class="grid"></div>

<script>
const API="https://tmdb.chgov.cc.cd";

async function load(q=""){
 const url=q?`${API}/search/movie?query=${q}`:`${API}/movie/popular`;
 const res=await fetch(url);
 const data=await res.json();

 const app=document.getElementById("app");
 app.innerHTML="";

 data.results.forEach(m=>{
   const div=document.createElement("div");
   div.className="card";
   div.innerHTML=`
     <img src="https://image.tmdb.org/t/p/w500${m.poster_path}">
     <p>${m.title}</p>
   `;
   div.onclick=()=>location.href=`detail.html?id=${m.id}`;
   app.appendChild(div);
 });
}

document.getElementById("search").oninput=e=>load(e.target.value);

load();
</script>

</body>
</html>
